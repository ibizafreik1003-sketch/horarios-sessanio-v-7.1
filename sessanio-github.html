<style>
:root{
  --m:#7BB8A0;--m2:#A8D5C2;--m3:#D6EDE5;
  --r:#D4A0A0;--r3:#F5E6E6;
  --d:#C9943A;--d2:#E8B96A;--d3:#FFF3DC;
  --az:#B8D8E8;--az2:#D6EBF5;
  --cafe:#4A2C17;--g:#7A6E65;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#EAF5F0,#F5E6E6,#EAF5F0);color:#3A2A1A;min-height:100vh;}
header{background:linear-gradient(135deg,var(--m),var(--az));padding:0 14px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(123,184,160,.3);}
nav{background:rgba(255,255,255,.85);display:flex;overflow-x:auto;border-bottom:2px solid var(--m3);}
nav button{background:none;border:none;border-bottom:3px solid transparent;color:var(--g);font-size:12px;font-weight:600;padding:10px 12px;cursor:pointer;white-space:nowrap;font-family:inherit;}
nav button.active{color:var(--m);border-bottom-color:var(--m);}
main{padding:14px;max-width:1100px;margin:0 auto;}
.page{display:none;}.page.active{display:block;}
.card{background:rgba(255,255,255,.95);border-radius:12px;box-shadow:0 4px 18px rgba(123,184,160,.15);padding:16px;margin-bottom:14px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:12px;}
@media(max-width:600px){.g2{grid-template-columns:1fr;}}
label{display:block;font-size:11px;font-weight:700;color:var(--g);text-transform:uppercase;margin-bottom:3px;}
input,select,textarea{width:100%;padding:8px 10px;border:1.5px solid var(--m2);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:#3A2A1A;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--m);}
textarea{resize:vertical;min-height:54px;}
.fg{margin-bottom:10px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.bp{background:var(--m);color:#fff;}
.bg{background:var(--d);color:#fff;}
.bd{background:var(--r);color:#fff;}.bd:hover{opacity:.85;}
.bo{background:rgba(123,184,160,.12);border:1.5px solid var(--m);color:var(--m);}
.bsm{padding:4px 8px;font-size:11px;}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;margin:2px;}
.emp-card{background:#fff;border-radius:12px;box-shadow:0 3px 14px rgba(123,184,160,.14);padding:14px;border-left:4px solid var(--m);}
.av{width:44px;height:44px;border-radius:50%;background:var(--az2);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--cafe);border:2px solid var(--d);flex-shrink:0;overflow:hidden;}
.av img{width:100%;height:100%;object-fit:cover;}
.hor-wrap{overflow-x:auto;}
.ht{width:100%;border-collapse:collapse;font-size:12px;min-width:750px;}
.ht th{background:linear-gradient(135deg,var(--m),var(--az));color:#fff;padding:7px 4px;text-align:center;font-size:11px;}
.ht td{border:1px solid var(--m3);padding:5px;text-align:center;vertical-align:middle;}
.ht tr:nth-child(even) td{background:rgba(123,184,160,.04);}
.dias-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;}
.dia{padding:5px 10px;border-radius:20px;border:1.5px solid var(--m2);background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:var(--g);user-select:none;}
.dia.on{background:var(--m);color:#fff;border-color:var(--m);}
.rc{padding:6px 11px;border-radius:20px;border:2px solid #ccc;background:#fff;color:#777;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.stat{background:#fff;border-radius:10px;padding:13px;text-align:center;border:1px solid rgba(123,184,160,.2);}
.stat-n{font-size:26px;font-weight:700;color:var(--m);}
.stat-l{font-size:11px;color:var(--g);margin-top:2px;}
.nom-card{background:#fff;border-radius:12px;box-shadow:0 3px 14px rgba(123,184,160,.14);padding:14px;margin-bottom:11px;border-left:4px solid var(--d);}
.nom-tot{background:linear-gradient(135deg,var(--m3),var(--d3));border-radius:10px;padding:12px 16px;margin-top:12px;}
.pcard{background:#fff;border-radius:12px;box-shadow:0 3px 14px rgba(123,184,160,.14);padding:13px;margin-bottom:9px;border-left:4px solid var(--r);}
.nitem{background:#fff;border-radius:9px;padding:11px;margin-bottom:8px;border-left:4px solid var(--d);display:flex;justify-content:space-between;gap:10px;}
.xitem{background:#fff;border-radius:9px;padding:11px;margin-bottom:8px;border-left:4px solid var(--az);display:flex;justify-content:space-between;gap:10px;}
.ritem{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--m3);border-radius:8px;margin-bottom:7px;}
.alerta{background:#FFF5F5;border:1.5px solid var(--r);border-radius:10px;padding:11px 14px;margin-bottom:12px;}
.dw{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:5px;}
.dc{border:1.5px solid var(--m2);border-radius:7px;padding:4px 2px;text-align:center;background:#fff;font-size:9px;}
.dc.libre{background:#F8D7DA;border-color:var(--r);}
.dc.ok{background:#E8F5E9;border-color:var(--m);}
.dc select{font-size:9px;padding:1px;border:1px solid var(--m2);border-radius:3px;width:100%;margin-bottom:2px;}
.dc button{width:100%;font-size:9px;padding:2px;border:1px solid var(--m2);background:transparent;border-radius:3px;cursor:pointer;font-family:inherit;color:var(--g);}
.dc button.on{background:#F8D7DA;border-color:var(--r);color:#A06060;font-weight:700;}
.overlay{display:none;position:fixed;inset:0;background:rgba(58,42,26,.45);z-index:200;align-items:center;justify-content:center;padding:12px;}
.overlay.open{display:flex;}
.modal{background:#FDFAF5;border-radius:14px;padding:20px;width:100%;max-width:510px;max-height:90vh;overflow-y:auto;box-shadow:0 14px 50px rgba(123,184,160,.25);}
.modal h3{font-size:16px;margin-bottom:12px;padding-bottom:9px;border-bottom:2px solid var(--m3);color:var(--cafe);}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:11px;border-top:1px solid var(--m3);}
.cb{background:#fff;border-radius:12px;padding:24px;max-width:320px;width:100%;text-align:center;}
#toast{position:fixed;bottom:16px;right:16px;background:var(--m);color:#fff;padding:9px 15px;border-radius:9px;font-size:13px;border-left:4px solid var(--d);opacity:0;transform:translateY(8px);transition:all .3s;z-index:999;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0);}
#toast.err{background:var(--r);}
.fb{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.sm{font-size:11px;color:var(--g);}
</style>

ace-between;margin-top:8px;padding-top:7px;border-top:1px solid var(--m3);flex-wrap:wrap;gap:4px"><span class="sm">Normal: <b>'+hrs+'h</b>'+(xH>0?' + extras: <b style="color:var(--az)">'+xH+'h</b>':'')+'</span><span style="font-weight:700;font-size:12px">'+fCOP(pN)+(pE>0?' + <span style="color:var(--az)">'+fCOP(pE)+'</span>':'')+' = <span style="color:var(--m)">'+fCOP(pN+pE)+'</span></span></div></div>';});h+='<div class="nom-tot"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:7px"><div><div style="font-weight:700;font-size:14px;color:var(--cafe)">💰 Total a pagar</div><div class="sm">Normal: '+fCOP(tN)+' + Extras: '+fCOP(tE)+'</div></div><div style="font-size:23px;font-weight:700;color:var(--d)">'+fCOP(tN+tE)+'</div></div></div>';document.getElementById("tab-nomina").innerHTML=h;}

// ══ EXTRAS ══
function calcExt(){var e=document.getElementById("x-e").value,s=document.getElementById("x-s").value;var res=document.getElementById("x-res");if(!e||!s){res.textContent="";return;}var m=tM(s)-tM(e);if(m<=0){res.textContent="⚠️ Inválido";return;}var hh=mH(m),rec=parseFloat(document.getElementById("x-rec").value)||1.25;var empId=document.getElementById("x-emp").value,emp=ge(empId),vh=(emp&&emp.vh)||0;res.textContent="⏱ "+hh+"h extra → 💰 "+fCOP(hh*vh*rec);}
function rExt(){var tab=document.getElementById("tab-extras");var wk=wKey(),lunes=getLunes(),lf=new Date(lunes);lf.setDate(lunes.getDate()+6);var fi=lunes.toISOString().slice(0,10),ff=lf.toISOString().slice(0,10);var extSemana=S.extras.filter(function(x){return x.fecha>=fi&&x.fecha<=ff;});var h='<div class="fb"><span style="font-size:18px;font-weight:700;color:var(--cafe)">⏱️ Horas Extras</span><button class="btn bp" id="btn-ne2">➕ Registrar extra</button></div><div class="card sm" style="background:var(--az2);border-left:4px solid var(--az);margin-bottom:12px">⚖️ <b>25%</b> diurnas · <b>75%</b> nocturnas · <b>100%</b> dominicales/festivos (CST)</div><div style="font-weight:700;margin-bottom:7px;color:var(--cafe)">Semana: '+wk+'</div>';if(!extSemana.length){h+='<div class="card" style="text-align:center;padding:24px;color:var(--g)">Sin horas extras esta semana</div>';}else{var tot=0;extSemana.forEach(function(x){var emp=ge(x.empId),vh=(emp&&emp.vh)||0;var hh=mH(tM(x.hasta)-tM(x.desde)),pago=hh*vh*(parseFloat(x.rec)||1.25);tot+=pago;h+='<div class="xitem"><div style="flex:1"><div style="font-weight:700;font-size:13px">'+(emp?emp.nombre.split(" ").slice(0,2).join(" "):"—")+'</div><div class="sm">📅 '+x.fecha+' · ⏰ '+x.desde+'–'+x.hasta+' · <b>'+hh+'h</b></div>'+(x.mot?'<div style="font-size:12px;margin-top:2px">'+x.mot+'</div>':'')+'<div style="font-weight:700;color:var(--az);margin-top:3px">'+fCOP(pago)+'</div></div><div style="display:flex;flex-direction:column;gap:4px"><button class="btn bo bsm" data-xe="edit" data-xid="'+x.id+'">✏️</button><button class="btn bd bsm" data-xe="del" data-xid="'+x.id+'">🗑️</button></div></div>';});h+='<div class="nom-tot" style="background:linear-gradient(135deg,var(--az2),var(--d3))"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-weight:700;font-size:13px;color:var(--cafe)">Total extras semana</div><div style="font-size:20px;font-weight:700;color:var(--az)">'+fCOP(tot)+'</div></div></div>';}tab.innerHTML=h;document.getElementById("btn-ne2").onclick=function(){abrirExt(null);};tab.addEventListener("click",function(ev){var b=ev.target.closest("[data-xe]");if(!b)return;var id=b.dataset.xid,ac=b.dataset.xe;if(ac==="edit")abrirExt(id);if(ac==="del")confirmar("¿Eliminar extra?","No se puede deshacer.","⏱️",function(){S.extras=S.extras.filter(function(x){return x.id!==id;});guardar();toast("Extra eliminada");rExt();});});}
function abrirExt(id){var x=id?S.extras.find(function(e){return e.id===id;}):null;document.getElementById("mxh").textContent=x?"✏️ Editar Extra":"⏱️ Registrar Extra";document.getElementById("x-id").value=id||"";document.getElementById("x-emp").innerHTML=S.empleados.map(function(e){return'<option value="'+e.id+'">'+e.nombre+'</option>';}).join("");document.getElementById("x-emp").value=x?x.empId:(S.empleados[0]?S.empleados[0].id:"");document.getElementById("x-fecha").value=x?x.fecha:new Date().toISOString().slice(0,10);document.getElementById("x-e").value=x?x.desde:"20:00";document.getElementById("x-s").value=x?x.hasta:"22:00";document.getElementById("x-rec").value=x?(x.rec||"1.25"):"1.25";document.getElementById("x-mot").value=x?(x.mot||""):"";calcExt();openModal("m-ext");}
function guardarExt(){var empId=document.getElementById("x-emp").value,fecha=document.getElementById("x-fecha").value,desde=document.getElementById("x-e").value,hasta=document.getElementById("x-s").value;if(!empId||!fecha||!desde||!hasta){toast("Completa todos los campos","err");return;}if(tM(hasta)<=tM(desde)){toast("Salida debe ser después de entrada","err");return;}var id=document.getElementById("x-id").value;var obj={id:id||uid(),empId:empId,fecha:fecha,desde:desde,hasta:hasta,rec:document.getElementById("x-rec").value,mot:document.getElementById("x-mot").value.trim()};if(id){var idx=S.extras.findIndex(function(x){return x.id===id;});S.extras[idx]=obj;toast("Extra actualizada ✓");}else{S.extras.push(obj);toast("Extra registrada ✓");}guardar();closeModal("m-ext");rExt();}

// ══ PROPINAS ══
function rProp(){var wk=wKey();var activos=S.empleados.filter(function(e){return e.estado==="activo";}).sort(function(a,b){return prio(a)-prio(b);});var totH=0;activos.forEach(function(e){totH+=hSem(e.id,wk);});var bruta=S.propinas[wk]||0,desc=Math.round(bruta*0.20),neta=bruta-desc;var h='<div class="fb"><span style="font-size:18px;font-weight:700;color:var(--cafe)">🍀 Propinas</span><span class="sm">'+wk+'</span></div><div class="card" style="margin-bottom:12px"><div style="font-weight:700;margin-bottom:8px">💵 Propinas de la semana</div><div style="display:flex;gap:9px;align-items:flex-end;flex-wrap:wrap"><div style="flex:1;min-width:150px"><label>Total recaudado (COP)</label><input type="number" id="prop-v" value="'+bruta+'" min="0" style="font-size:16px;font-weight:700"></div><button class="btn bg" id="btn-cp">Calcular</button></div><div style="margin-top:9px;background:var(--r3);border-radius:7px;padding:9px;border-left:3px solid var(--r)"><div style="font-size:11px;font-weight:700;color:#A06060;margin-bottom:4px">📌 Descuento 20% — Mantenimiento y gastos operativos</div><div style="display:flex;gap:12px;font-size:13px;flex-wrap:wrap"><span>Bruto: <b>'+fCOP(bruta)+'</b></span><span>Descuento: <b style="color:#A06060">-'+fCOP(desc)+'</b></span><span>A distribuir: <b style="color:var(--m);font-size:14px">'+fCOP(neta)+'</b></span></div></div></div>';if(totH===0){h+='<div class="card" style="text-align:center;padding:22px;color:var(--g)">⏱️ Sin horas esta semana.</div>';}else{activos.forEach(function(e){var hrs=hSem(e.id,wk),pct=totH>0?(hrs/totH*100).toFixed(1):0,monto=totH>0?Math.round(hrs/totH*neta):0;var rs=e.roles.map(gr),col=rs[0]?rs[0].color:"var(--m)";h+='<div class="pcard" style="border-left-color:'+col+'"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:7px"><div><div style="font-weight:700;font-size:13px">'+e.nombre.split(" ").slice(0,2).join(" ")+'</div><div class="sm">⏱ '+hrs+'h de '+totH+'h = '+pct+'%</div><div style="background:#eee;border-radius:5px;height:5px;width:140px;margin-top:4px"><div style="background:var(--m);height:5px;border-radius:5px;width:'+pct+'%"></div></div></div><div style="text-align:right"><div class="sm">Le corresponde</div><div style="font-size:19px;font-weight:700;color:var(--r)">'+fCOP(monto)+'</div></div></div></div>';});h+='<div class="nom-tot" style="background:linear-gradient(135deg,var(--r3),var(--d3))"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:700;font-size:13px;color:var(--cafe)">🍀 Total distribuido</div><div class="sm">'+totH+'h · '+activos.length+' personas · -20% descontado</div></div><div style="font-size:22px;font-weight:700;color:var(--r)">'+fCOP(neta)+'</div></div></div>';}document.getElementById("tab-propinas").innerHTML=h;document.getElementById("btn-cp").onclick=function(){S.propinas[wk]=parseFloat(document.getElementById("prop-v").value)||0;guardar();rProp();toast("Propinas calculadas ✓");};}

// ══ NOVEDADES ══
function rNov(){var tab=document.getElementById("tab-novedades");var h='<div class="fb"><span style="font-size:18px;font-weight:700;color:var(--cafe)">📋 Novedades</span><button class="btn bp" id="btn-nn">➕ Registrar</button></div><div class="card">';if(!S.novedades.length){h+='<div style="text-align:center;padding:24px;color:var(--g)">📋 Sin novedades</div>';}else{S.novedades.slice().reverse().forEach(function(n){var e=ge(n.empId);var bg=n.estado==="aprobada"?"#D6EDE5":n.estado==="rechazada"?"var(--r3)":"var(--d3)";var clr=n.estado==="aprobada"?"#2D6B52":n.estado==="rechazada"?"#A06060":"#8B6020";h+='<div class="nitem"><div style="flex:1"><div style="font-weight:700;font-size:13px;margin-bottom:3px">'+(e?e.nombre.split(" ").slice(0,2).join(" "):"—")+'</div><span class="tag" style="background:var(--d3);color:#8B6020">'+(TIPOS[n.tipo]||n.tipo)+'</span><span class="tag" style="background:'+bg+';color:'+clr+'">'+(n.estado==="aprobada"?"✅ Aprobada":n.estado==="rechazada"?"❌ Rechazada":"⏳ Pendiente")+'</span><div style="font-size:12px;margin-top:4px">'+n.desc+'</div><div class="sm" style="margin-top:2px">'+n.fi+(n.ff&&n.ff!==n.fi?" → "+n.ff:"")+'</div></div><div style="display:flex;flex-direction:column;gap:4px"><button class="btn bo bsm" data-na="edit" data-nid="'+n.id+'">✏️</button><button class="btn bd bsm" data-na="del" data-nid="'+n.id+'">🗑️</button></div></div>';});}h+='</div>';tab.innerHTML=h;document.getElementById("btn-nn").onclick=function(){abrirNov(null);};tab.addEventListener("click",function(ev){var b=ev.target.closest("[data-na]");if(!b)return;var id=b.dataset.nid,ac=b.dataset.na;if(ac==="edit")abrirNov(id);if(ac==="del")confirmar("¿Eliminar novedad?","No se puede deshacer.","📋",function(){S.novedades=S.novedades.filter(function(n){return n.id!==id;});guardar();toast("Eliminada");rNov();});});}
function abrirNov(id){var n=id?S.novedades.find(function(x){return x.id===id;}):null;document.getElementById("mnh").textContent=n?"✏️ Editar Novedad":"📋 Registrar Novedad";document.getElementById("n-id").value=id||"";document.getElementById("n-emp").innerHTML=S.empleados.map(function(e){return'<option value="'+e.id+'">'+e.nombre+'</option>';}).join("");document.getElementById("n-emp").value=n?n.empId:(S.empleados[0]?S.empleados[0].id:"");document.getElementById("n-tipo").value=n?n.tipo:"cita_medica";document.getElementById("n-fi").value=n?n.fi:new Date().toISOString().slice(0,10);document.getElementById("n-ff").value=n?(n.ff||""):"";document.getElementById("n-desc").value=n?n.desc:"";document.getElementById("n-est").value=n?n.estado:"pendiente";document.getElementById("n-sop").value=n?(n.soporte||"pendiente"):"pendiente";openModal("m-nov");}
function guardarNov(){var empId=document.getElementById("n-emp").value,fi=document.getElementById("n-fi").value,desc=document.getElementById("n-desc").value.trim();if(!empId||!fi||!desc){toast("Completa los campos obligatorios","err");return;}var ff=document.getElementById("n-ff").value||fi;var fd=new Date(fi),dn=fd.getUTCDay()||7;fd.setUTCDate(fd.getUTCDate()+4-dn);var ys=new Date(Date.UTC(fd.getUTCFullYear(),0,1));var wn=Math.ceil((((fd-ys)/86400000)+1)/7);var id=document.getElementById("n-id").value;var obj={id:id||uid(),empId:empId,tipo:document.getElementById("n-tipo").value,fi:fi,ff:ff,desc:desc,soporte:document.getElementById("n-sop").value,estado:document.getElementById("n-est").value,semKey:new Date(fi).getFullYear()+"-S"+String(wn).padStart(2,"0")};if(id){var idx=S.novedades.findIndex(function(n){return n.id===id;});S.novedades[idx]=obj;toast("Actualizada ✓");}else{S.novedades.push(obj);toast("Registrada ✓");}guardar();closeModal("m-nov");rNov();}

// ══ ROLES ══
function rRoles(){var tab=document.getElementById("tab-roles");var h='<div class="fb"><span style="font-size:18px;font-weight:700;color:var(--cafe)">🏷️ Cargos</span><button class="btn bp" id="btn-nr">➕ Nuevo cargo</button></div><div class="card">';S.roles.forEach(function(r){h+='<div class="ritem"><div style="display:flex;align-items:center;gap:8px"><div style="width:12px;height:12px;border-radius:50%;background:'+r.color+'"></div><div><div style="font-weight:700">'+r.nombre+'</div><div class="sm">'+(r.desc||"")+'</div></div></div><div style="display:flex;gap:5px"><button class="btn bo bsm" data-ra="edit" data-rid="'+r.id+'">✏️</button><button class="btn bd bsm" data-ra="del" data-rid="'+r.id+'">🗑️</button></div></div>';});h+='</div>';tab.innerHTML=h;document.getElementById("btn-nr").onclick=function(){abrirRol(null);};tab.addEventListener("click",function(ev){var b=ev.target.closest("[data-ra]");if(!b)return;var id=b.dataset.rid,ac=b.dataset.ra;if(ac==="edit")abrirRol(id);if(ac==="del")confirmar("¿Eliminar cargo?","Solo si no está en uso.","🏷️",function(){if(S.empleados.some(function(e){return e.roles&&e.roles.indexOf(id)>=0;})){toast("Cargo en uso","err");return;}S.roles=S.roles.filter(function(r){return r.id!==id;});guardar();toast("Eliminado");rRoles();});});}
function abrirRol(id){var r=id?S.roles.find(function(x){return x.id===id;}):null;document.getElementById("mrh").textContent=r?"✏️ Editar Cargo":"🏷️ Nuevo Cargo";document.getElementById("r-id").value=id||"";document.getElementById("r-nom").value=r?r.nombre:"";document.getElementById("r-desc").value=r?(r.desc||""):"";document.getElementById("r-col").value=r?r.color:"#7BB8A0";openModal("m-rol");}
function guardarRol(){var nom=document.getElementById("r-nom").value.trim();if(!nom){toast("Nombre requerido","err");return;}var id=document.getElementById("r-id").value;var obj={id:id||uid(),nombre:nom,desc:document.getElementById("r-desc").value.trim(),color:document.getElementById("r-col").value};if(id){var idx=S.roles.findIndex(function(r){return r.id===id;});S.roles[idx]=obj;toast("Actualizado ✓");}else{S.roles.push(obj);toast("Creado ✓");}guardar();closeModal("m-rol");rRoles();}

cargarLocal();
